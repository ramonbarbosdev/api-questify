name: Deploy Postgres

on:
  workflow_dispatch: 

jobs:
  deploy-postgres:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Postgres on Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |

            if ! docker network ls | grep -q app-network; then
              docker network create app-network
            fi

            if [ "$(docker ps -q -f name=postgres-db)" ]; then
              echo "Postgres já está rodando"
            elif [ "$(docker ps -aq -f name=postgres-db)" ]; then
              echo "Postgres existe mas parado, iniciando..."
              docker start postgres-db
            else
              echo "Criando Postgres..."
              docker run -d \
                --name postgres-db \
                --network app-network \
                -e POSTGRES_DB=db_nivra \
                -e POSTGRES_USER=postgres \
                -e POSTGRES_PASSWORD=admin \
                -v postgres_data:/var/lib/postgresql/data \
                --restart unless-stopped \
                postgres:15-alpine
            fi

            if ! docker inspect -f '{{json .NetworkSettings.Networks}}' postgres-db | grep -q app-network; then
              docker network connect app-network postgres-db
            fi